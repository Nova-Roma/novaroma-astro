# .pages.yml — Pages CMS config for your site

media:
  name: images
  label: Images
  input: src/images
  output: src/images
  path: ""                          # start at src/images
  extensions: [png, jpg, jpeg, webp, svg]

settings:
  content:
    merge: true

content:
  # ---------------------
  # INFO PAGES
  # ---------------------
  - name: infopages
    label: Info Pages
    type: collection
    path: src/content/infopages
    filename: "{primary}.md"
    view:
      primary: page
      fields: [page, pubDate]
      sort: [page]
    fields:
      - { name: page,    label: Page,             type: string, required: true }
      - { name: pubDate, label: Publication Date, type: date }
      - { name: body,    label: Body,             type: rich-text }

  # ---------------------
  # POSTS
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, pubDate]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - { name: title,       label: Title,        type: string, required: true }
      - { name: pubDate,     label: Publication Date, type: date }
      - { name: description, label: Description,   type: text }
      - name: image
        label: Cover Image
        type: object
        fields:
          - name: url   label: Image     type: image options: { media: images, path: blog }
          - { name: alt, label: Alt text, type: string }
      - { name: tags,        label: Tags,        type: string, list: true }

  # ---------------------
  # SPEAKERS
  - name: speakers
    label: Speakers
    type: collection
    path: src/content/speakers
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, role]
      sort: [name]
    fields:
      - { name: name,     label: Name,     type: string, required: true }
      - { name: role,     label: Role,     type: string }
      - { name: company,  label: Company,  type: string }
      - name: headshot
        label: Headshot
        type: object
        fields:
          - name: url   label: Image     type: image options: { media: images, path: speakers }
          - { name: alt, label: Alt text, type: string }
      - { name: location, label: Location, type: string }
      - { name: summary,  label: Summary,  type: text }
      - name: tags
        label: Tags
        type: string
        list: true
      - name: socials
        label: Socials
        type: object
        fields:
          - { name: twitter,  label: Twitter URL,   type: string }
          - { name: github,   label: GitHub URL,    type: string }
          - { name: linkedin, label: LinkedIn URL,  type: string }
          - { name: website,  label: Website URL,   type: string }
      - { name: talks,     label: Talks,     type: string, list: true }
      - { name: featured,  label: Featured,  type: boolean }

  # ---------------------
  # SESSIONS
  - name: sessions
    label: Sessions
    type: collection
    path: src/content/sessions
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, day, start]
      sort: [day, start]
    fields:
      - { name: title,   label: Title,       type: string, required: true }
      - { name: abstract,label: Abstract,    type: text, required: true }
      - name: speakers
        label: Speakers (slugs)
        type: string
        list: true
      - name: day
        label: Day
        type: string
        options:
          - day-1
          - day-2
          - day-3
          - day-4
          - day-5
          - day-6
          - day-7
      - { name: start,  label: Start Time,   type: string }
      - { name: end,    label: End Time,     type: string }
      - { name: room,   label: Room,         type: string }
      - { name: track,  label: Track,        type: string }
      - name: level
        label: Level
        type: string
        options:
          - beginner
          - intermediate
          - advanced
      - name: tags
        label: Tags
        type: string
        list: true

  # ---------------------
  # ENTITIES (communities, sponsors, partners)
  - name: entities
    label: Entities
    type: collection
    path: src/content/entities
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, kind, tier, featured]
      sort: [kind, tier]
    fields:
      - { name: name,   label: Name,    type: string, required: true }
      - name: kind
        label: Kind
        type: string
        options:
          - community
          - event_sponsor
          - partner
      - name: tier
        label: Tier
        type: string
        options:
          - platinum
          - gold
          - silver
          - bronze
      - { name: description, label: Short description, type: string }
      - { name: featured, label: Featured on homepage, type: boolean }
      - { name: url,    label: URL,     type: string }
      - name: logo
        label: Logo
        type: object
        fields:
          - name: url   label: Image     type: image options: { media: images, path: sponsors }
          - { name: alt, label: Alt text, type: string }
